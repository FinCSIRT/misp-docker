services:
  redis:
    image: valkey/valkey:7.2
    restart: unless-stopped
    container_name: misp-redis
    command: valkey-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - dokploy-network

  db:
    image: mariadb:10.11
    restart: unless-stopped
    container_name: misp-db
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    command: >
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=128M
      --innodb-use-native-aio=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network

  misp-modules:
    image: ghcr.io/misp/misp-docker/misp-modules:latest
    restart: unless-stopped
    container_name: misp-modules
    networks:
      - dokploy-network

  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    restart: unless-stopped
    container_name: misp-core
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/users/login"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 240s  # Give it 4 minutes to initialize
    environment:
      # Critical settings
      - BASE_URL=${BASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DISABLE_SSL_REDIRECT=true
      - DISABLE_PRINTING_PLAINTEXT_CREDENTIALS=true
      - ENABLE_DB_SETTINGS=true
      - DEBUG=0
      
      # Admin settings
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_ORG=${ADMIN_ORG}
      - GPG_PASSPHRASE=${GPG_PASSPHRASE}
      
      # Database
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # NGINX
      - NGINX_X_FORWARDED_FOR=true
      - NGINX_SET_REAL_IP_FROM=172.0.0.0/8,10.0.0.0/8,192.168.0.0/16
      
      # PHP settings for stability
      - PHP_MEMORY_LIMIT=1024M
      - PHP_MAX_EXECUTION_TIME=300
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.misp-http.rule=Host(`misp.fincident.org`)"
      - "traefik.http.routers.misp-http.entrypoints=web"
      - "traefik.http.routers.misp-http.middlewares=redirect-to-https"
      - "traefik.http.routers.misp.rule=Host(`misp.fincident.org`)"
      - "traefik.http.routers.misp.entrypoints=websecure"
      - "traefik.http.routers.misp.tls.certresolver=letsencrypt"
      - "traefik.http.services.misp.loadbalancer.server.port=80"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
    name: dokploy-network
