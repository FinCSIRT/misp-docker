services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    container_name: misp-redis
    command: redis-server --requirepass RedisPassword123!
    networks:
      - dokploy-network

  db:
    image: mariadb:10.11
    restart: unless-stopped
    container_name: misp-db
    environment:
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=Password123!
      - MYSQL_ROOT_PASSWORD=RootPassword123!
      - MYSQL_DATABASE=misp
    command: >
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=128M
    networks:
      - dokploy-network

  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    restart: unless-stopped
    container_name: misp-core
    depends_on:
      - redis
      - db
    environment:
      - BASE_URL=https://misp.fincident.org
      - ENCRYPTION_KEY=ThisIsA32CharacterKeyForMISP12345
      - DISABLE_SSL_REDIRECT=true
      - DISABLE_PRINTING_PLAINTEXT_CREDENTIALS=true
      - ENABLE_DB_SETTINGS=true
      - DEBUG=0
      - ADMIN_EMAIL=admin@fincident.org
      - ADMIN_PASSWORD=AdminPassword123!
      - ADMIN_ORG=FINCIDENT
      - GPG_PASSPHRASE=GpgPassphrase123
      - MYSQL_HOST=db
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=Password123!
      - MYSQL_DATABASE=misp
      - REDIS_HOST=redis
      - REDIS_PASSWORD=RedisPassword123!
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.misp.rule=Host(`misp.fincident.org`)"
      - "traefik.http.routers.misp.entrypoints=websecure"
      - "traefik.http.routers.misp.tls.certresolver=letsencrypt"
      - "traefik.http.services.misp.loadbalancer.server.port=80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
    name: dokploy-network
