services:
  # This is capable to relay via gmail, Amazon SES, or generic relays
  # See: https://gitlab.com/egos-tech/smtp
  mail:
    image: ghcr.io/egos-tech/smtp:1.1.3
    restart: always
    container_name: misp-mail  # Added container name
    environment:
      # For use with Amazon SES relay
      - "SES_USER=${SES_USER}"
      - "SES_PASSWORD=${SES_PASSWORD}"
      - "SES_REGION=${SES_REGION}"
      - "SES_PORT=${SES_PORT}"
      # Generic SMTP relay
      - "SMARTHOST_ADDRESS=${SMARTHOST_ADDRESS}"
      - "SMARTHOST_PORT=${SMARTHOST_PORT}"
      - "SMARTHOST_USER=${SMARTHOST_USER}"
      - "SMARTHOST_PASSWORD=${SMARTHOST_PASSWORD}"
      - "SMARTHOST_ALIASES=${SMARTHOST_ALIASES}"
    networks:
      - dokploy-network

  redis:
    image: valkey/valkey:7.2
    restart: always
    container_name: misp-redis
    command: |
      sh -c '
        if [ "$${ENABLE_REDIS_EMPTY_PASSWORD:-false}" = "true" ]; then
          exec valkey-server
        else
          exec valkey-server --requirepass "$${REDIS_PASSWORD:-redispassword}"
        fi
      '
    environment:
      - "ENABLE_REDIS_EMPTY_PASSWORD=${ENABLE_REDIS_EMPTY_PASSWORD:-false}"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}"
    healthcheck:
      test: |
        sh -c '
          if [ "$${ENABLE_REDIS_EMPTY_PASSWORD:-false}" = "true" ]; then
            valkey-cli -p $${REDIS_PORT:-6379} ping | grep -q PONG || exit 1
          else
            valkey-cli -a "$${REDIS_PASSWORD:-redispassword}" -p $${REDIS_PORT:-6379} ping | grep -q PONG || exit 1
          fi
        '
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
      start_interval: 5s
    volumes:
      - cache_data:/data:Z
    networks:
      - dokploy-network

  db:
    # We use MariaDB because it supports ARM and has the expected collations
    image: mariadb:10.11
    restart: always
    container_name: misp-db
    environment:
      - "MYSQL_USER=${MYSQL_USER:-misp}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD:-example}"
      - "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}"
      - "MYSQL_DATABASE=${MYSQL_DATABASE:-misp}"
    command: "\
      --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-2048M} \
      --innodb-change-buffering=${INNODB_CHANGE_BUFFERING:-none} \
      --innodb-io-capacity=${INNODB_IO_CAPACITY:-1000} \
      --innodb-io-capacity-max=${INNODB_IO_CAPACITY_MAX:-2000} \
      --innodb-log-file-size=${INNODB_LOG_FILE_SIZE:-600M} \
      --innodb-read-io-threads=${INNODB_READ_IO_THREADS:-16} \
      --innodb-stats-persistent=${INNODB_STATS_PERSISTENT:-ON} \
      --innodb-write-io-threads=${INNODB_WRITE_IO_THREADS:-4}"
    volumes:
      - mysql_data:/var/lib/mysql:Z
    cap_add:
      - SYS_NICE  # CAP_SYS_NICE Prevent runaway mysql log
    healthcheck:
      test: mysqladmin --user=$$MYSQL_USER --password=$$MYSQL_PASSWORD status
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 30s
      start_interval: 5s
    ports:
      - "3307:3306"  # Map to different external port
    networks:
      - dokploy-network

  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:${CORE_RUNNING_TAG:-latest}
    restart: always
    container_name: misp-core
    cap_add:
      - AUDIT_WRITE
    build:
      context: core/.
      args:
          - CORE_TAG=${CORE_TAG:?Missing or outdated .env file, see README.md for instructions}
          - CORE_COMMIT=${CORE_COMMIT}
          - CORE_FLAVOR=${CORE_FLAVOR:-full}
          - PHP_VER=${PHP_VER:?Missing or outdated .env file, see README.md for instructions}
          - PYPI_REDIS_VERSION=${PYPI_REDIS_VERSION}
          - PYPI_LIEF_VERSION=${PYPI_LIEF_VERSION}
          - PYPI_PYDEEP2_VERSION=${PYPI_PYDEEP2_VERSION}
          - PYPI_PYTHON_MAGIC_VERSION=${PYPI_PYTHON_MAGIC_VERSION}
          - PYPI_MISP_LIB_STIX2_VERSION=${PYPI_MISP_LIB_STIX2_VERSION}
          - PYPI_MAEC_VERSION=${PYPI_MAEC_VERSION}
          - PYPI_MIXBOX_VERSION=${PYPI_MIXBOX_VERSION}
          - PYPI_CYBOX_VERSION=${PYPI_CYBOX_VERSION}
          - PYPI_PYMISP_VERSION=${PYPI_PYMISP_VERSION}
          - PYPI_MISP_STIX_VERSION=${PYPI_MISP_STIX_VERSION}
          - PYPI_SETUPTOOLS_VERSION=${PYPI_SETUPTOOLS_VERSION}
          - PYPI_SUPERVISOR_VERSION=${PYPI_SUPERVISOR_VERSION}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      misp-modules:
        condition: service_healthy
    healthcheck:
      test: curl -ks ${BASE_URL:-https://localhost}/users/heartbeat > /dev/null || exit 1
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 30s
      start_interval: 30s
    # REMOVED PORTS - Traefik will handle external access
    # ports:
    #   - "${CORE_HTTP_PORT:-80}:80"
    #   - "${CORE_HTTPS_PORT:-443}:443"
    volumes:
      - "./configs/:/var/www/MISP/app/Config/:Z"
      - "./logs/:/var/www/MISP/app/tmp/logs/:Z"
      - "./files/:/var/www/MISP/app/files/:Z"
      - "./ssl/:/etc/nginx/certs/:Z"
      - "./gnupg/:/var/www/MISP/.gnupg/:Z"
    environment:
      - "BASE_URL=${BASE_URL}"
      - "CRON_USER_ID=${CRON_USER_ID}"
      - "CRON_PULLALL=${CRON_PULLALL}"
      - "CRON_PUSHALL=${CRON_PUSHALL}"
      - "DISABLE_IPV6=${DISABLE_IPV6}"
      - "DISABLE_SSL_REDIRECT=true"  # Force disable SSL redirect since Traefik handles it
      - "ENABLE_DB_SETTINGS=${ENABLE_DB_SETTINGS}"
      - "ENABLE_BACKGROUND_UPDATES=${ENABLE_BACKGROUND_UPDATES}"
      - "ENCRYPTION_KEY=${ENCRYPTION_KEY}"
      - "DISABLE_CA_REFRESH=${DISABLE_CA_REFRESH}"
      - "DISABLE_PRINTING_PLAINTEXT_CREDENTIALS=${DISABLE_PRINTING_PLAINTEXT_CREDENTIALS}"
      # standard settings
      - "ADMIN_EMAIL=${ADMIN_EMAIL}"
      - "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
      - "ADMIN_KEY=${ADMIN_KEY}"
      - "ADMIN_ORG=${ADMIN_ORG}"
      - "ADMIN_ORG_UUID=${ADMIN_ORG_UUID}"
      - "GPG_PASSPHRASE=${GPG_PASSPHRASE}"
      - "ATTACHMENTS_DIR=${ATTACHMENTS_DIR}"
      # NGINX behind Traefik settings
      - "NGINX_X_FORWARDED_FOR=true"  # Enable IP forwarding from Traefik
      - "NGINX_SET_REAL_IP_FROM=172.0.0.0/8,10.0.0.0/8"  # Trust Docker networks
      - "NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-50M}"
      # mysql settings
      - "MYSQL_HOST=${MYSQL_HOST:-db}"
      - "MYSQL_PORT=${MYSQL_PORT:-3306}"
      - "MYSQL_USER=${MYSQL_USER:-misp}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD:-example}"
      - "MYSQL_DATABASE=${MYSQL_DATABASE:-misp}"
      # redis settings
      - "REDIS_HOST=${REDIS_HOST:-redis}"
      - "REDIS_PORT=${REDIS_PORT:-6379}"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}"
      - "ENABLE_REDIS_EMPTY_PASSWORD=${ENABLE_REDIS_EMPTY_PASSWORD:-false}"
      # debug setting 
      - "DEBUG=0"  # Force debug off for security
      # Security settings
      - "HSTS_MAX_AGE=31536000"
      - "X_FRAME_OPTIONS=SAMEORIGIN"
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      
      # HTTP to HTTPS redirect
      - "traefik.http.routers.misp-http.rule=Host(`misp.fincident.org`)"
      - "traefik.http.routers.misp-http.entrypoints=web"
      - "traefik.http.routers.misp-http.middlewares=redirect-to-https"
      
      # HTTPS configuration
      - "traefik.http.routers.misp.rule=Host(`misp.fincident.org`)"
      - "traefik.http.routers.misp.entrypoints=websecure"
      - "traefik.http.routers.misp.tls=true"
      - "traefik.http.routers.misp.tls.certresolver=letsencrypt"
      
      # Service configuration - CORRECTED PORT (MISP listens on 80 internally)
      - "traefik.http.services.misp.loadbalancer.server.port=80"
      
      # Middleware definitions
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      
      # Security headers middleware
      - "traefik.http.middlewares.misp-securityheaders.headers.forcestsheader=true"
      - "traefik.http.middlewares.misp-securityheaders.headers.stsseconds=31536000"
      - "traefik.http.middlewares.misp-securityheaders.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.misp-securityheaders.headers.stspreload=true"
      - "traefik.http.middlewares.misp-securityheaders.headers.customrequestheaders.X-Forwarded-Proto=https"
      
      # Apply middlewares
      - "traefik.http.routers.misp.middlewares=misp-securityheaders"
    networks:
      - dokploy-network

  misp-modules:
    image: ghcr.io/misp/misp-docker/misp-modules:${MODULES_RUNNING_TAG:-latest}
    restart: always
    container_name: misp-modules  # Added container name
    build:
      context: modules/.
      args:
        - MODULES_TAG=${MODULES_TAG:?Missing or outdated .env file, see README.md for instructions}
        - MODULES_COMMIT=${MODULES_COMMIT}
        - MODULES_FLAVOR=${MODULES_FLAVOR:-full}
    healthcheck:
      test: "/bin/bash -c '</dev/tcp/localhost/6666'"
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
      start_interval: 5s
    volumes:
      # custom MISP modules are loaded at startup time
      - "./custom/action_mod/:/custom/action_mod/:Z"
      - "./custom/expansion/:/custom/expansion/:Z"
      - "./custom/export_mod/:/custom/export_mod/:Z"
      - "./custom/import_mod/:/custom/import_mod/:Z"
    networks:
      - dokploy-network

  misp-guard:
    profiles:
      - misp-guard
    restart: always
    image: ghcr.io/misp/misp-docker/misp-guard:${GUARD_RUNNING_TAG:-latest}
    container_name: misp-guard  # Added container name
    build:
      context: guard/.
      args:
        - GUARD_TAG=${GUARD_TAG:?Missing or outdated .env file, see README.md for instructions}
        - GUARD_COMMIT=${GUARD_COMMIT}
    depends_on:
      - misp-core
    # REMOVED ports unless specifically needed externally
    # ports:
    #   - "${GUARD_PORT:-8888}:${GUARD_PORT:-8888}"
    environment:
      - "GUARD_PORT=${GUARD_PORT:-8888}"
      - "GUARD_ARGS=${GUARD_ARGS}"
    volumes:
      - ./guard/config.json:/config.json:ro
    healthcheck:
      test: "/bin/bash -c '</dev/tcp/localhost/${GUARD_PORT:-8888}'"
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dokploy-network

volumes:
    mysql_data:
    cache_data:

networks:
  dokploy-network:
    external: true
    name: dokploy-network
